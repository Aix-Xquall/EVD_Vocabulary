name: Daily Vocabulary

on:
  workflow_dispatch:
    inputs:
      run_audio_test:
        description: "Generate the chapter 2 first-10 0.8x Azure audio test."
        required: false
        default: false
        type: boolean
      audio_test_chapter:
        description: "CSV chapter title for the audio test."
        required: false
        default: "EMC航電詞彙整合2"
      audio_test_chapter_index:
        description: "One-based formal chapter index for the audio test."
        required: false
        default: "2"
      audio_test_limit:
        description: "Number of words to include in the audio test."
        required: false
        default: "10"
      audio_test_output_name:
        description: "Folder and MP3 base name under output/audio_tests."
        required: false
        default: "emc2_first10_0_8"
      audio_test_title:
        description: "Title shown on the generated audio test page."
        required: false
        default: "EMC航電詞彙整合2 前 10 個 0.8 語速測試"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-vocabulary.yml"
      - "*.py"
      - "vocabulary/**/*.csv"
      - "requirements.txt"
      - "tests/**"
      - "web/**"
  schedule:
    # 06:30 Asia/Taipei.
    - cron: "30 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Generation stays outside the github-pages environment so it reads repository secrets.
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate daily vocabulary
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          EVD_SITE_URL: https://aix-xquall.github.io/EVD_Vocabulary/
          EVD_SPEECH_RATE: "-20%"
          EVD_MAX_AUDIO_SEGMENTS_PER_RUN: "200"
          HARD_WORDS_SHEET_CSV_URL: ${{ secrets.HARD_WORDS_SHEET_CSV_URL }}
          HARD_WORDS_READ_TOKEN: ${{ secrets.HARD_WORDS_READ_TOKEN }}
          HARD_WORDS_WRITE_URL: ${{ secrets.HARD_WORDS_WRITE_URL }}
        run: python main.py

      - name: Generate 0.8x audio test sample
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_audio_test }}
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
        run: >
          python audio_sample_generator.py
          --chapter-index "${{ inputs.audio_test_chapter_index }}"
          --limit "${{ inputs.audio_test_limit }}"
          --speech-rate=-20%
          --repeat-count 3
          --output-name "${{ inputs.audio_test_output_name }}"
          --title "${{ inputs.audio_test_title }}"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: generate daily vocabulary"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
