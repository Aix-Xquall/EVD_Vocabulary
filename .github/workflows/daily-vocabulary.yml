name: Daily Vocabulary

on:
  workflow_dispatch:
    inputs:
      run_audio_test:
        description: "Generate the chapter 2 first-10 0.8x Azure audio test."
        required: false
        default: false
        type: boolean
      skip_line_notification:
        description: "Skip LINE notification for hard-word add/remove refreshes."
        required: false
        default: true
        type: boolean
      audio_test_chapter:
        description: "CSV chapter title for the audio test."
        required: false
        default: "EMC航電詞彙整合2"
      audio_test_chapter_index:
        description: "One-based formal chapter index for the audio test."
        required: false
        default: "2"
      audio_test_limit:
        description: "Number of words to include in the audio test."
        required: false
        default: "10"
      audio_test_output_name:
        description: "Folder and MP3 base name under output/audio_tests."
        required: false
        default: "emc2_first10_0_8"
      audio_test_title:
        description: "Title shown on the generated audio test page."
        required: false
        default: "EMC航電詞彙整合2 前 10 個 0.8 語速測試"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-vocabulary.yml"
      - "*.py"
      - "vocabulary/**/*.csv"
      - "requirements.txt"
      - "README.md"
      - "apps_script/**"
      - "tests/**"
      - "web/**"
  schedule:
    # 06:30 Asia/Taipei.
    - cron: "30 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Generation stays outside the github-pages environment so it reads repository secrets.
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Configure Google Cloud credentials
        env:
          GOOGLE_TTS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_TTS_CREDENTIALS_JSON }}
        run: |
          if [[ -n "${GOOGLE_TTS_CREDENTIALS_JSON}" ]]; then
            credentials_path="${RUNNER_TEMP}/google-tts-key.json"
            printf '%s' "${GOOGLE_TTS_CREDENTIALS_JSON}" > "${credentials_path}"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${credentials_path}" >> "$GITHUB_ENV"
          fi

      - name: Detect generation scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          should_generate=false
          if [[ "${{ github.event_name }}" != "push" ]]; then
            should_generate=true
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)"
            if [[ -z "$changed_files" ]]; then
              changed_files="$(git diff --name-only HEAD^ HEAD || true)"
            fi
            if echo "$changed_files" | grep -Eq '^(\.github/workflows/daily-vocabulary\.yml|[^/]+\.py|requirements\.txt|vocabulary/.*\.csv)$'; then
              should_generate=true
            fi
          fi
          echo "should_generate=${should_generate}" >> "$GITHUB_OUTPUT"
          echo "Daily generation required: ${should_generate}"

      - name: Generate daily vocabulary
        if: ${{ steps.scope.outputs.should_generate == 'true' }}
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          EVD_TTS_PROVIDER: ${{ vars.EVD_TTS_PROVIDER || 'google' }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          EVD_SITE_URL: https://aix-xquall.github.io/EVD_Vocabulary/
          EVD_SPEECH_RATE: "-20%"
          EVD_MAX_AUDIO_SEGMENTS_PER_RUN: "0"
          GOOGLE_ENGLISH_VOICE: ${{ vars.GOOGLE_ENGLISH_VOICE || 'en-US-Neural2-F' }}
          GOOGLE_CHINESE_VOICE: ${{ vars.GOOGLE_CHINESE_VOICE || 'cmn-TW-Wavenet-A' }}
          EVD_GOOGLE_TTS_FREE_REMAINING: ${{ vars.EVD_GOOGLE_TTS_FREE_REMAINING }}
          EVD_AZURE_SPEECH_FREE_REMAINING: ${{ vars.EVD_AZURE_SPEECH_FREE_REMAINING }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_SPEECH_RESOURCE_GROUP: ${{ secrets.AZURE_SPEECH_RESOURCE_GROUP }}
          AZURE_SPEECH_RESOURCE_NAME: ${{ secrets.AZURE_SPEECH_RESOURCE_NAME }}
          HARD_WORDS_SHEET_CSV_URL: ${{ secrets.HARD_WORDS_SHEET_CSV_URL }}
          HARD_WORDS_READ_TOKEN: ${{ secrets.HARD_WORDS_READ_TOKEN }}
          HARD_WORDS_WRITE_URL: ${{ secrets.HARD_WORDS_WRITE_URL }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            python main.py
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.skip_line_notification }}" != "true" ]]; then
            python main.py
          else
            python main.py --skip-line
          fi

      - name: Publish static web assets
        if: ${{ steps.scope.outputs.should_generate != 'true' }}
        run: |
          cp web/index.html output/index.html
          cp web/app.js output/app.js
          cp web/styles.css output/styles.css

      - name: Generate 0.8x audio test sample
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_audio_test }}
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
        run: >
          python audio_sample_generator.py
          --chapter-index "${{ inputs.audio_test_chapter_index }}"
          --limit "${{ inputs.audio_test_limit }}"
          --speech-rate=-20%
          --repeat-count 3
          --output-name "${{ inputs.audio_test_output_name }}"
          --title "${{ inputs.audio_test_title }}"

      - name: Commit generated files
        if: ${{ steps.scope.outputs.should_generate == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_audio_test) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: generate daily vocabulary"
          git pull --rebase origin main
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
