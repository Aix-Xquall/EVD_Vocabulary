name: LINE Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/line-smoke-test.yml"

permissions:
  contents: read

jobs:
  send-line-test:
    runs-on: ubuntu-latest

    steps:
      - name: Send LINE test message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          required = ["LINE_CHANNEL_ACCESS_TOKEN", "LINE_USER_ID"]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              print("Missing required GitHub secrets: " + ", ".join(missing))
              sys.exit(1)

          repo = os.getenv("GITHUB_REPOSITORY", "")
          run_number = os.getenv("GITHUB_RUN_NUMBER", "")
          server_url = os.getenv("GITHUB_SERVER_URL", "https://github.com")
          message = (
              "EVD Vocabulary LINE 測試成功\n\n"
              f"Repository: {repo}\n"
              f"Run: #{run_number}\n"
              f"{server_url}/{repo}/actions"
          )

          payload = {
              "to": os.environ["LINE_USER_ID"],
              "messages": [{"type": "text", "text": message}],
          }
          request = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"LINE API status: {response.status}")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"LINE API HTTP error: {exc.code}")
              print(body)
              sys.exit(1)
          except urllib.error.URLError as exc:
              print(f"LINE API connection error: {exc}")
              sys.exit(1)
          PY
