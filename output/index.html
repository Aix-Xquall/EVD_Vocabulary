<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EVD Daily Vocabulary</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Aerospace / Avionics / EMC</p>
          <h1>每日工程英文</h1>
        </div>
      </section>

      <nav id="chapterTabs" class="chapter-tabs" aria-label="Vocabulary chapters"></nav>

      <section class="player-layout">
        <aside class="word-list" aria-label="Daily words">
          <div class="list-header">
            <h2>今日單字</h2>
            <button id="toggleMeaningButton" type="button">隱藏中文</button>
          </div>
          <div id="wordList" class="word-items"></div>
        </aside>

        <section class="study-panel">
          <div class="current-word">
            <p id="categoryText" class="eyebrow">Category</p>
            <h2 id="wordText">Loading</h2>
            <p id="pronunciationText" class="pronunciation"></p>
            <p id="meaningText" class="meaning"></p>
            <div class="hard-word-actions">
              <button id="hardWordButton" type="button">加入未熟記單字練習</button>
              <span id="hardWordStatus" class="sync-status"></span>
            </div>
          </div>

          <div class="controls" aria-label="Playback controls">
            <button id="previousButton" type="button">上一個</button>
            <button id="playButton" class="primary" type="button">開始播放</button>
            <button id="pauseButton" type="button">暫停</button>
            <button id="nextButton" type="button">下一個</button>
          </div>

          <div class="toggles">
            <label><input id="repeatAllToggle" type="checkbox" checked> 循環本章節</label>
            <label><input id="repeatCurrentToggle" type="checkbox"> 重複目前單字</label>
            <label><input id="includeExamplesToggle" type="checkbox" checked> 播放例句</label>
            <label class="rate-control" for="playbackRate">
              英文語速 <output id="playbackRateValue">0.8x</output>
              <input id="playbackRate" type="range" min="0.5" max="1.5" step="0.1" value="0.8">
            </label>
            <label class="rate-control" for="exampleRepeatCount">
              英文重複 <output id="exampleRepeatCountValue">3</output>
              <input id="exampleRepeatCount" type="range" min="1" max="5" step="1" value="3">
            </label>
            <button id="combinedAudioButton" type="button">播放本章節</button>
          </div>

          <div class="examples">
            <h3>Examples</h3>
            <p id="exampleOneEn"></p>
            <p id="exampleOneZh" class="translation"></p>
            <p id="exampleTwoEn"></p>
            <p id="exampleTwoZh" class="translation"></p>
          </div>
        </section>
      </section>

      <section class="practice-panel">
        <div class="practice-header">
          <h2>每日練習</h2>
          <div id="practiceScore">0 / 0</div>
        </div>
        <div class="practice-card">
          <p id="questionMode" class="eyebrow">Practice</p>
          <h3 id="questionText">Loading</h3>
          <div id="answerOptions" class="answer-options"></div>
          <p id="answerFeedback" class="feedback"></p>
          <button id="nextQuestionButton" type="button">下一題</button>
        </div>
      </section>
    </main>

    <audio id="audioPlayer" preload="metadata"></audio>
    <script src="app.js"></script>
  </body>
</html>
